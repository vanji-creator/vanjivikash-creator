<style>
  :root, [data-theme="terminal"] {
    --bg: #050a07;
    --surface: #0a1410;
    --text: #b8ffb8;
    --bright: #d8ffd8;
    --dim: #4a7a4a;
    --accent: #39ff7a;
    --accent-2: #ffb84d;
    --err: #ff5a4a;
    --rule: #142818;
    --sel: rgba(57,255,122,.25);
    --hm-0: #0e1f12; --hm-1: #0e4429; --hm-2: #006d32; --hm-3: #26a641; --hm-4: #39d353;
  }
  [data-theme="amber"] {
    --bg: #110a02;
    --surface: #1a1305;
    --text: #ffcc6a;
    --bright: #ffe2a8;
    --dim: #886632;
    --accent: #ffaa2e;
    --accent-2: #f7e08a;
    --err: #ff5a4a;
    --rule: #2a1f0a;
    --sel: rgba(255,170,46,.25);
    --hm-0: #1a1305; --hm-1: #44320e; --hm-2: #6d5816; --hm-3: #a6841e; --hm-4: #ffaa2e;
  }
  [data-theme="paper"] {
    --bg: #f6f1e7;
    --surface: #fbf7ec;
    --text: #1d1b16;
    --bright: #000;
    --dim: #6b6357;
    --accent: #c84b0e;
    --accent-2: #2a6fdb;
    --err: #c84b0e;
    --rule: #d8cfbb;
    --sel: rgba(200,75,14,.15);
    --hm-0: #e6dcc4; --hm-1: #f0c8a8; --hm-2: #e89a6c; --hm-3: #d56b32; --hm-4: #a83e10;
  }
  [data-theme="mono"] {
    --bg: #0a0a0a;
    --surface: #131313;
    --text: #e5e5e5;
    --bright: #fff;
    --dim: #777;
    --accent: #5fb3ff;
    --accent-2: #c084fc;
    --err: #ff6b6b;
    --rule: #222;
    --sel: rgba(95,179,255,.25);
    --hm-0: #1a1a1a; --hm-1: #2a2a2a; --hm-2: #555; --hm-3: #aaa; --hm-4: #fff;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 14px; line-height: 1.55;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background .25s, color .25s;
  }
  /* CRT scanlines (subtle) */
  [data-theme="terminal"] body::before,
  [data-theme="amber"] body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1000;
    background: repeating-linear-gradient(to bottom, rgba(255,255,255,0) 0, rgba(255,255,255,0) 2px, rgba(255,255,255,.025) 3px);
    mix-blend-mode: overlay;
  }
  [data-theme="terminal"] body::after,
  [data-theme="amber"] body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1001;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.45) 100%);
  }
  ::selection { background: var(--sel); color: var(--bright); }
  a { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent); }
  a:hover { color: var(--bright); }

  /* ───── window chrome ───── */
  .window {
    max-width: 1100px;
    margin: 22px auto;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 8px;
    box-shadow: 0 30px 100px rgba(0,0,0,.6), 0 0 0 1px var(--rule);
    overflow: hidden;
  }
  .title-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--rule);
    background: color-mix(in srgb, var(--surface) 70%, #000 30%);
    user-select: none;
  }
  .dots { display: flex; gap: 6px; }
  .dots span { width: 11px; height: 11px; border-radius: 50%; }
  .dots .r { background: #ff5f57; }
  .dots .y { background: #febc2e; }
  .dots .g { background: #28c840; }
  .title-bar .label {
    margin: 0 auto; font-size: 11px; color: var(--dim); letter-spacing: .05em;
  }
  .title-bar .label b { color: var(--text); font-weight: 500; }
  .title-bar .themes { display: flex; gap: 5px; }
  .title-bar .themes button {
    all: unset; cursor: pointer;
    width: 14px; height: 14px; border-radius: 50%;
    border: 1px solid var(--rule);
  }
  .title-bar .themes button[aria-pressed="true"] { border-color: var(--bright); transform: scale(1.15); }
  .title-bar .themes button[data-t="terminal"] { background: #050a07; }
  .title-bar .themes button[data-t="amber"]    { background: #110a02; }
  .title-bar .themes button[data-t="paper"]    { background: #f6f1e7; }
  .title-bar .themes button[data-t="mono"]     { background: #0a0a0a; }

  /* ───── terminal body ───── */
  .term {
    padding: 22px 26px 32px;
    min-height: calc(100vh - 88px);
    font-size: 14px;
    cursor: text;
    position: relative;
  }
  .term .greeting { color: var(--dim); }
  .term .line { white-space: pre-wrap; word-break: break-word; }
  .term .prompt {
    display: flex; align-items: baseline; gap: 8px;
  }
  .term .prompt .ps1 { color: var(--accent); white-space: nowrap; }
  .term .prompt .ps1 .at { color: var(--dim); }
  .term .prompt .ps1 .path { color: var(--accent-2); }
  .term .prompt .cmd-text {
    background: transparent; border: none; color: var(--bright);
    font: inherit; outline: none; flex: 1; caret-color: transparent;
    padding: 0;
  }
  .term .prompt .ghost { color: var(--dim); position: relative; }
  .term .input-row { display: flex; align-items: baseline; gap: 8px; position: relative; }
  .term .input-row .typed { color: var(--bright); }
  .term .input-row .ghost-rest { color: var(--dim); }
  .term .input-row .caret {
    width: 8px; height: 1.05em;
    background: var(--accent);
    display: inline-block; vertical-align: text-top;
    animation: blink 1.05s steps(2) infinite;
    margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .term .input-row.no-caret .caret { display: none; }

  .term .output { padding: 4px 0 14px 0; }
  .term .output .cmd-name { color: var(--accent); }
  .term .output .h { color: var(--bright); font-weight: 500; }
  .term .output .sub { color: var(--dim); }
  .term .output .bul { padding-left: 18px; }
  .term .output .bul li { margin-bottom: 4px; list-style: none; position: relative; }
  .term .output .bul li::before { content: "▸"; color: var(--accent); position: absolute; left: -16px; }
  .term .output table { border-collapse: collapse; width: 100%; max-width: 720px; margin: 4px 0; }
  .term .output table td { padding: 4px 14px 4px 0; vertical-align: top; }
  .term .output table td.k { color: var(--accent-2); white-space: nowrap; }
  .term .output .tag { display: inline-block; padding: 1px 7px; margin: 2px 3px 2px 0; background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); font-size: 12px; border-radius: 3px; }
  .term .output .err { color: var(--err); }
  .term .output .ok  { color: var(--accent); }
  .term .output .box {
    border: 1px solid var(--rule); padding: 12px 14px; margin: 6px 0;
    background: color-mix(in srgb, var(--surface) 70%, #000 30%);
    border-radius: 4px;
  }
  .term .output .ascii { font-size: 11px; line-height: 1.0; color: var(--accent); white-space: pre; }

  /* heatmap injection */
  .term .heatmap-wrap { color: var(--text); margin: 4px 0; }

  /* boot sequence */
  .boot-line { color: var(--dim); font-size: 13px; line-height: 1.65; }
  .boot-line .ok { color: var(--accent); }

  /* hint pill */
  .hint {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 100px;
    background: var(--surface); border: 1px solid var(--rule);
    padding: 6px 12px; border-radius: 999px; font-size: 11.5px; color: var(--dim);
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    pointer-events: none; opacity: 0; transition: opacity .4s; z-index: 50;
  }
  .hint.show { opacity: 1; }
  .hint kbd { background: var(--rule); padding: 1px 6px; border-radius: 3px; font-family: inherit; color: var(--text); }

  /* agent pill */
  .agent-pill {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    font-size: 10.5px; color: var(--dim);
    padding: 3px 10px; border: 1px solid var(--rule); border-radius: 999px;
    background: color-mix(in srgb, var(--surface) 70%, transparent);
    backdrop-filter: blur(6px);
    z-index: 50;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .agent-pill::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 5px var(--accent); }

  /* Quick-tap command chips */
  .chips {
    display: flex; flex-wrap: wrap; gap: 6px; margin: 14px 0 0;
  }
  .chips button {
    all: unset; cursor: pointer;
    padding: 4px 10px; font-family: inherit; font-size: 12px;
    border: 1px solid var(--rule); border-radius: 3px;
    color: var(--dim); transition: all .15s;
  }
  .chips button:hover { color: var(--accent); border-color: var(--accent); }

  /* Project card style */
  .term .pjt { margin-bottom: 14px; }
  .term .pjt .head { display: flex; gap: 12px; align-items: baseline; }
  .term .pjt .head .name { color: var(--bright); font-weight: 600; }
  .term .pjt .head .kind { color: var(--dim); }
  .term .pjt .head .date { color: var(--accent-2); margin-left: auto; }
  .term .pjt .one { color: var(--text); margin: 4px 0; }
  .term .pjt .meta { color: var(--dim); font-size: 12.5px; }

  /* ───── mobile ───── */
  @media (max-width: 720px) {
    .window { margin: 0; border-radius: 0; min-height: 100vh; }
    .term { padding: 14px 16px 80px; }
    .term .output table td { display: block; padding: 2px 0; }
    .term .output table td.k { margin-top: 6px; color: var(--accent-2); }
  }
</style>
</head>
<body>

<main class="window">
  <header class="title-bar">
    <div class="dots"><span class="r"></span><span class="y"></span><span class="g"></span></div>
    <div class="label"><b>vanchi@portfolio</b>&nbsp;:&nbsp;~&nbsp;—&nbsp;zsh&nbsp;·&nbsp;<span id="dims">120×40</span></div>
    <div class="themes" role="radiogroup" aria-label="Theme">
      <button data-t="terminal" aria-pressed="true"  title="Phosphor"></button>
      <button data-t="amber"    aria-pressed="false" title="Amber"></button>
      <button data-t="paper"    aria-pressed="false" title="Paper"></button>
      <button data-t="mono"     aria-pressed="false" title="Mono"></button>
    </div>
  </header>

  <div class="term" id="term">
    <div id="boot"></div>
    <div id="history"></div>
    <div class="input-row" id="input-row">

    <div class="chips" id="chips"></div>

</main>
